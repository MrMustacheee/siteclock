*{box-sizing:border-box}
.hd{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:${S.card};border-bottom:1px solid ${S.line}}
.brand{font-family:Archivo;font-weight:800;font-size:18px;display:flex;align-items:center;gap:9px}
.brandlogo{height:30px;width:auto;display:block}
.loginlogo{height:64px;width:auto;display:block;margin:0 auto 4px}
.mk{width:14px;height:14px;border-radius:4px;background:${S.green};display:inline-block}
.mk2{width:28px;height:28px;border-radius:8px;background:${S.green};margin:0 auto 12px}
.whoami{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600}
.wdot{width:9px;height:9px;border-radius:50%;background:${S.green}}
.signout{background:none;border:1px solid ${S.line};color:${S.mute};font-weight:600;font-size:12px;padding:7px 12px;border-radius:9px;cursor:pointer;margin-left:4px}
.main{padding:22px 16px 40px}
.splash{max-width:300px;margin:80px auto;text-align:center;color:${S.mute}}
.errbar{max-width:680px;margin:0 auto 14px;background:#FBEBE7;color:#9C3A2A;font-size:13px;padding:10px 14px;border-radius:10px;cursor:pointer}
.login{max-width:380px;margin:0 auto;padding:40px 16px 24px;display:flex;flex-direction:column;gap:16px}
.lcard{background:${S.card};border:1px solid ${S.line};border-radius:20px;padding:26px 22px;box-shadow:0 10px 40px rgba(27,37,48,.06)}
.lbrand{font-family:Archivo;font-weight:800;font-size:22px;display:flex;align-items:center;justify-content:center;gap:9px}
.lsub{font-size:14px;color:${S.mute};margin:4px 0 18px;text-align:center}
.ltabs{display:flex;background:${S.soft};border-radius:11px;padding:3px;margin-bottom:18px}
.ltabs button{flex:1;font-family:Inter;font-weight:600;font-size:14px;color:${S.mute};background:none;border:none;padding:10px;border-radius:9px;cursor:pointer}
.ltabs button.on{background:#fff;color:${S.ink};box-shadow:0 1px 3px rgba(0,0,0,.08)}
.ll{display:block;font-size:12px;font-weight:600;color:${S.mute};margin:0 0 6px}
.li{width:100%;border:1px solid ${S.line};border-radius:11px;padding:13px 14px;font-size:20px;text-align:center;letter-spacing:6px;margin-bottom:14px;background:#fff;color:${S.ink}}
.li2{width:100%;border:1px solid ${S.line};border-radius:11px;padding:12px 14px;font-size:15px;margin-bottom:14px;background:#fff;color:${S.ink}}
.lerr{background:#FBEBE7;color:${S.red};font-size:13px;font-weight:500;padding:10px 12px;border-radius:10px;margin-bottom:12px}
.lbtn{width:100%;background:${S.green};color:#fff;border:none;border-radius:12px;font-family:Archivo;font-weight:800;font-size:17px;padding:15px;cursor:pointer}
.lbtn:disabled{opacity:.6}
.lnote{font-size:12px;color:${S.mute};text-align:center;line-height:1.5}
.phone{max-width:440px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.phead{display:flex;justify-content:space-between;align-items:flex-start}
.hi{font-family:Archivo;font-weight:800;font-size:24px}
.atsite{display:flex;align-items:center;gap:7px;font-size:14px;color:${S.mute};margin-top:3px}
.atsite .d{width:9px;height:9px;border-radius:50%}
.addr{font-size:12px;color:${S.mute};margin-top:3px;margin-left:16px}
.roletag{font-size:12px;font-weight:600;color:${S.mute};background:${S.soft};padding:6px 11px;border-radius:999px}
.hero{background:${S.card};border:1px solid ${S.line};border-radius:20px;padding:26px 22px;text-align:center;box-shadow:0 8px 30px rgba(27,37,48,.05)}
.loc{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;padding:7px 14px;border-radius:999px;margin-bottom:18px}
.loc.ok{background:#E7F4ED;color:${S.green}}.loc.no{background:#FBEBE7;color:${S.red}}
.locdot{width:9px;height:9px;border-radius:50%;background:currentColor}
.acc{font-size:12px;color:${S.mute};margin:-10px 0 14px}
.pickhint{font-size:13px;font-weight:600;color:${S.ink};margin-bottom:8px}
.sitepick{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.spick{display:flex;justify-content:space-between;align-items:center;background:${S.soft};border:2px solid transparent;border-radius:11px;padding:12px 14px;cursor:pointer;font-family:Inter;width:100%}
.spick.on{border-color:${S.green};background:#E7F4ED}
.spn{font-size:14px;font-weight:600;color:${S.ink};text-align:left}
.spd{font-family:'JetBrains Mono',monospace;font-size:12px;color:${S.mute};white-space:nowrap;margin-left:10px}
.timer{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:46px;letter-spacing:1px;line-height:1}
.since{font-size:13px;color:${S.mute};margin-top:6px}
.ready{font-family:Archivo;font-weight:700;font-size:20px;color:${S.mute};margin-bottom:4px}
.big{width:100%;border:none;border-radius:16px;color:#fff;font-family:Archivo;font-weight:800;font-size:24px;padding:22px;cursor:pointer;margin-top:20px}
.big:disabled{opacity:.45}
.big.go{background:${S.green}}.big.stop{background:${S.red}}
.note{margin-top:14px;font-size:13px;color:${S.red};font-weight:500}
.remind{background:#FFF6E9;border:1px solid ${S.amber};border-radius:14px;padding:16px;margin-bottom:18px;text-align:left}
.rtitle{font-family:Archivo;font-weight:800;font-size:16px;color:#B07415;margin-bottom:5px}
.rtext{font-size:13px;color:${S.ink};line-height:1.45;margin-bottom:12px}
.rbtns{display:flex;gap:9px}
.rb{flex:1;border:none;border-radius:11px;font-family:Archivo;font-weight:700;font-size:15px;padding:13px;cursor:pointer}
.rb.keep{background:#fff;border:1.5px solid ${S.amber};color:#B07415}
.rb.out{background:${S.red};color:#fff}
.rb:disabled{opacity:.6}
.day{background:${S.card};border:1px solid ${S.line};border-radius:14px;padding:14px 16px}
.dayrow{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:8px}
.dayrow .of{color:${S.mute};font-weight:500}
.date{color:${S.mute};font-weight:500;font-size:12px;margin-left:4px}
.mono{font-family:'JetBrains Mono',monospace}
.track{height:10px;background:${S.soft};border-radius:5px;overflow:hidden}
.fill{height:100%;border-radius:5px;transition:width .4s}
